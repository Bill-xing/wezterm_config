set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,wezterm:RGB"
set -g history-limit 50000
set -g mouse on

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "copy-mode -e"
bind -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" ""
bind -T copy-mode-vi WheelUpPane select-pane -t = \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane -t = \; send-keys -X -N 1 scroll-down-and-cancel
setw -g mode-keys vi
set -g set-clipboard on
set -g escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off

unbind C-a
set -g prefix C-b
bind C-b send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g status-position bottom
set -g status-style fg=colour252,bg=colour236
set -g status-left-length 30
set -g status-right-length 80
set -g status-left "#[fg=colour39,bold] #S #[default]"
set -g status-right "#{?client_prefix,#[fg=colour231]#[bg=colour160] PREFIX #[default],}#[fg=colour250] %Y-%m-%d %H:%M "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour231,bg=colour31,bold] #I:#W #[default]"
setw -g window-status-activity-style fg=colour214,bold

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'erikw/tmux-powerline'

run '~/.tmux/plugins/tpm/tpm'
