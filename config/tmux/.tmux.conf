set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,wezterm:RGB,*256col*:RGB"
set -as terminal-overrides ",*256col*:Tc"
set -g allow-passthrough on
set -ag update-environment "XDG_RUNTIME_DIR"
set -ag update-environment "DBUS_SESSION_BUS_ADDRESS"
set -ag update-environment "WAYLAND_DISPLAY"
set -ag update-environment "DISPLAY"
set -g history-limit 50000
set -g mouse on
setw -g xterm-keys on
set -s escape-time 0
set -sg repeat-time 300
setw -g mode-keys vi
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g display-panes-time 2000
set -g display-time 2000

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "copy-mode -e"
bind -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" ""
bind -T copy-mode-vi WheelUpPane select-pane -t = \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane -t = \; send-keys -X -N 1 scroll-down-and-cancel

unbind C-a
set -g prefix C-b
bind C-b send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

bind C-c command-prompt -I "#{session_name}" -p "Session name:" "new-session -Ad -s '%%' -c '#{pane_current_path}' \; switch-client -t '%%'"
bind . command-prompt -I "#{session_name}" -p "Rename session to:" "rename-session '%%'"
unbind ,
bind , command-prompt -I "#{window_name}" -p "Rename window to:" "rename-window '%%'"
bind s choose-tree -sZw

bind c new-window -c "#{pane_current_path}"
bind -n M-o new-window -c "#{pane_current_path}"
bind -r C-p previous-window
bind -r C-n next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind j select-pane -L
bind k select-pane -D
bind i select-pane -U
bind l select-pane -R
bind -r J resize-pane -L 5
bind -r K resize-pane -D 5
bind -r I resize-pane -U 5
bind -r L resize-pane -R 5
bind -n M-j select-pane -L
bind -n M-k select-pane -D
bind -n M-i select-pane -U
bind -n M-l select-pane -R
bind -n M-J resize-pane -L 3
bind -n M-K resize-pane -D 3
bind -n M-I resize-pane -U 3
bind -n M-L resize-pane -R 3
bind -n M-f resize-pane -Z
bind Space next-layout
bind W choose-tree -Z
bind S choose-tree 'move-pane -v -s "%%"'
bind V choose-tree 'move-pane -h -s "%%"'
bind > swap-pane -D
bind < swap-pane -U
bind b list-buffers
bind p paste-buffer
bind -n M-v copy-mode

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi j send-keys -X cursor-left
bind-key -T copy-mode-vi l send-keys -X cursor-right
bind-key -T copy-mode-vi i send-keys -X cursor-up
bind-key -T copy-mode-vi k send-keys -X cursor-down
bind-key -T copy-mode-vi J send-keys -X start-of-line
bind-key -T copy-mode-vi L send-keys -X end-of-line
bind-key -T copy-mode-vi I send-keys -N 5 -X cursor-up
bind-key -T copy-mode-vi K send-keys -N 5 -X cursor-down
bind-key -T copy-mode-vi = send-keys -X search-again
bind-key -T copy-mode-vi - send-keys -X search-reverse

bind -n C-S-v run-shell 'clip="$({ command -v pbpaste >/dev/null 2>&1 && pbpaste; } || { command -v wl-paste >/dev/null 2>&1 && wl-paste -n; } || { command -v xclip >/dev/null 2>&1 && xclip -selection clipboard -o; } || { command -v xsel >/dev/null 2>&1 && xsel --clipboard --output; })"; [ -n "$clip" ] && tmux set-buffer -- "$clip" && tmux paste-buffer'
bind -T copy-mode-vi C-S-v send-keys -X cancel \; run-shell 'clip="$({ command -v pbpaste >/dev/null 2>&1 && pbpaste; } || { command -v wl-paste >/dev/null 2>&1 && wl-paste -n; } || { command -v xclip >/dev/null 2>&1 && xclip -selection clipboard -o; } || { command -v xsel >/dev/null 2>&1 && xsel --clipboard --output; })"; [ -n "$clip" ] && tmux set-buffer -- "$clip" && tmux paste-buffer'
bind -n M-V run-shell 'clip="$({ command -v pbpaste >/dev/null 2>&1 && pbpaste; } || { command -v wl-paste >/dev/null 2>&1 && wl-paste -n; } || { command -v xclip >/dev/null 2>&1 && xclip -selection clipboard -o; } || { command -v xsel >/dev/null 2>&1 && xsel --clipboard --output; })"; [ -n "$clip" ] && tmux set-buffer -- "$clip" && tmux paste-buffer'
bind -T copy-mode-vi M-V send-keys -X cancel \; run-shell 'clip="$({ command -v pbpaste >/dev/null 2>&1 && pbpaste; } || { command -v wl-paste >/dev/null 2>&1 && wl-paste -n; } || { command -v xclip >/dev/null 2>&1 && xclip -selection clipboard -o; } || { command -v xsel >/dev/null 2>&1 && xsel --clipboard --output; })"; [ -n "$clip" ] && tmux set-buffer -- "$clip" && tmux paste-buffer'

bind -n C-1 run-shell 'session=1; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'
bind -n C-2 run-shell 'session=2; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'
bind -n C-3 run-shell 'session=3; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'
bind -n C-4 run-shell 'session=4; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'
bind -n C-5 run-shell 'session=5; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'
bind -n C-6 run-shell 'session=6; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'
bind -n C-7 run-shell 'session=7; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'
bind -n C-8 run-shell 'session=8; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'
bind -n C-9 run-shell 'session=9; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'
bind -n C-0 run-shell 'session=10; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux switch-client -t "$session"'

bind 1 run-shell 'session=1; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'
bind 2 run-shell 'session=2; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'
bind 3 run-shell 'session=3; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'
bind 4 run-shell 'session=4; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'
bind 5 run-shell 'session=5; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'
bind 6 run-shell 'session=6; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'
bind 7 run-shell 'session=7; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'
bind 8 run-shell 'session=8; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'
bind 9 run-shell 'session=9; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'
bind 0 run-shell 'session=10; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "#{pane_current_path}"; tmux move-window -s "#{window_id}" -t "$session:"; tmux switch-client -t "$session"'

set -g status-position bottom
set -g status-interval 5
set -g status-style fg=colour252,bg=colour236
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=colour39,bold] #S #[default]#[fg=colour244]|#[default] #[fg=colour250]#{session_windows} windows #[default]"
set -g status-right "#{?client_prefix,#[fg=colour231,bg=colour160,bold] PREFIX #[default] ,}#{?pane_in_mode,#[fg=colour231,bg=colour31,bold] COPY #[default] ,}#{?window_zoomed_flag,#[fg=colour231,bg=colour238,bold] ZOOM #[default] ,}#[fg=colour250]#h#[default] #[fg=colour244]|#[default] #[fg=colour252]%Y-%m-%d %H:%M "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour231,bg=colour31,bold] #I:#W #[default]"
setw -g window-status-activity-style fg=colour214,bold
setw -g window-status-bell-style fg=colour231,bg=colour160,bold
setw -g pane-border-status top
set -g pane-border-style fg=colour244
set -g pane-active-border-style fg=colour39
setw -g pane-border-format " #{pane_index} #{pane_current_command} @ #{b:pane_current_path} "

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'erikw/tmux-powerline'

run '~/.tmux/plugins/tpm/tpm'
